services:
  # Servicio de tu aplicación NestJS (Backend)
  cirsubbackend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cirsubbackend-docker
    container_name: cirsubbackend
    restart: always
    ports:
      - "${PORT}:${PORT}" # Expone el puerto de la aplicación

    # Carga todas las variables de entorno desde el archivo .env
    env_file:
      - ./.env

    environment:
      REDIS_HOST: redis

# Redis es compartido con otros servicios (contenedor "cirsubbackend-redis" en
# la red cirsub_default, administrado fuera de este compose). No se define
# aquí un servicio "redis:" propio para no chocar con ese contenedor por
# nombre en cada deploy.
networks:
  default:
    name: cirsub_default
    external: true
